<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
  body { background:#f5f0e8; width:100vw; height:100vh; overflow:hidden; }
  #ui { position:fixed; top:12px; right:12px; z-index:99; display:flex; align-items:center; gap:6px; }
  .btn { width:28px; height:28px; background:rgba(255,255,255,0.75); border:1px solid #ccc;
    border-radius:6px; font-size:16px; cursor:pointer; font-family:'Nunito',sans-serif;
    box-shadow:0 1px 4px rgba(0,0,0,.1); display:flex; align-items:center; justify-content:center; padding:0; }
  .btn:hover { background:white; }
  #stage { position:absolute; top:0; left:0; transform-origin:0 0; }
  svg { display:block; width:1100px; height:740px; }
  .bl  { stroke-width:3; stroke-linecap:round; fill:none; opacity:.6; }
  .ll  { stroke-width:2; stroke-linecap:round; fill:none; opacity:.4; }
  .bl2 { font-family:'Nunito',sans-serif; font-weight:800; font-size:14px; text-anchor:middle; dominant-baseline:central; fill:white; }
  .bs  { font-family:'Nunito',sans-serif; font-weight:400; font-size:11px; text-anchor:middle; fill:rgba(255,255,255,.8); }
  .ll2 { font-family:'Nunito',sans-serif; font-weight:700; font-size:11.5px; text-anchor:middle; fill:#444; }
  .cl  { font-family:'Nunito',sans-serif; font-weight:800; font-size:21px; text-anchor:middle; dominant-baseline:central; fill:white; }
  .cs  { font-family:'Nunito',sans-serif; font-size:12px; text-anchor:middle; fill:#ccc; }
</style>
</head>

<svg viewBox="0 0 1100 740" xmlns="http://www.w3.org/2000/svg">

<line class="ll" x1="830" y1="160" x2="970" y2="280" stroke="#e05a5a"/>
<line class="bl" x1="550" y1="370" x2="870" y2="420" stroke="#4caf7d"/>

<line class="ll" x1="870" y1="420" x2="1010" y2="465" stroke="#4caf7d"/>
<line class="bl" x1="550" y1="370" x2="720" y2="590" stroke="#9b59b6"/>
<line class="ll" x1="720" y1="590" x2="870" y2="625" stroke="#9b59b6"/>
<line class="ll" x1="720" y1="590" x2="800" y2="680" stroke="#9b59b6"/>
<line class="bl" x1="550" y1="370" x2="340" y2="590" stroke="#e88c30"/>
<line class="ll" x1="340" y1="590" x2="190" y2="625" stroke="#e88c30"/>
<line class="ll" x1="340" y1="590" x2="285" y2="680" stroke="#e88c30"/>
<!-- BRANCHES -->

<rect x="808" y="598" width="130" height="54" rx="8" fill="white" filter="url(#sh2)"/>

<text class="ll2" x="128" y="638">Vorbild, nicht Zwang</text>
<rect x="160" y="653" width="130" height="54" rx="8" fill="white" filter="url(#sh2)"/>

<!-- CENTER -->
<defs>
  <filter id="sh"  x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity=".18"/></filter>
  <filter id="sh2" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity=".12"/></filter>
  <filter id="sh3" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-opacity=".25"/></filter>
</defs>
<circle cx="550" cy="370" r="75" fill="#2c2c2c" filter="url(#sh3)"/>
<text class="cl" x="550" y="355">Konfuzius</text>
<text class="cs" x="550" y="378">孔子</text>
<text class="cs" x="550" y="396">551 – 479 v. Chr.</text>
</svg>
</div>

<script>
const stage = document.getElementById('stage');
let tx=0, ty=0, sc=1;

function apply() {
  stage.style.transform = `translate(${tx}px,${ty}px) scale(${sc})`;
}
function zoomTo(delta, cx, cy) {
  cx = cx ?? window.innerWidth/2;
  cy = cy ?? window.innerHeight/2;
  const ns = Math.min(4, Math.max(0.3, sc * delta));
  tx = cx - (cx - tx) * (ns/sc);
  ty = cy - (cy - ty) * (ns/sc);
  sc = ns;
  apply();
}
function init() {
  sc = 1;
  tx = (window.innerWidth  - 1100) / 2;
  ty = (window.innerHeight - 740)  / 2;
  apply();
}
init();

// Mouse drag
let mdrag=false, mlx, mly;
document.addEventListener('mousedown', e => { if(e.target.closest('#ui')) return; mdrag=true; mlx=e.clientX; mly=e.clientY; document.body.style.cursor='grabbing'; });
document.addEventListener('mouseup',   () => { mdrag=false; document.body.style.cursor='default'; });
document.addEventListener('mousemove', e => {
  if(!mdrag) return;
  tx += e.clientX-mlx; ty += e.clientY-mly;
  mlx=e.clientX; mly=e.clientY; apply();
});
document.addEventListener('wheel', e => {
  e.preventDefault();
  zoomTo(e.deltaY>0 ? 0.9 : 1.1, e.clientX, e.clientY);
}, {passive:false});

// Touch
let pts=[];
function getTouches(e){ return Array.from(e.touches); }
function tdist(a,b){ return Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY); }
document.addEventListener('touchstart', e => { e.preventDefault(); pts=getTouches(e); }, {passive:false});
document.addEventListener('touchmove',  e => {
  e.preventDefault();
  const t=getTouches(e);
  if(t.length===1 && pts.length>=1){
    tx+=t[0].clientX-pts[0].clientX;
    ty+=t[0].clientY-pts[0].clientY;
    apply();
  } else if(t.length===2 && pts.length>=2){
    const d0=tdist(pts[0],pts[1]), d1=tdist(t[0],t[1]);
    const mx=(t[0].clientX+t[1].clientX)/2, my=(t[0].clientY+t[1].clientY)/2;
    zoomTo(d1/d0, mx, my);
  }
  pts=t;
}, {passive:false});
document.addEventListener('touchend', e=>{ pts=getTouches(e); }, {passive:false});

// Buttons
document.getElementById('bp').onclick = () => zoomTo(1.2);
document.getElementById('bm').onclick = () => zoomTo(1/1.2);
document.getElementById('br').onclick = () => init();

// Toggle
let hidden=false;
const inner=document.getElementById('inner');
const tog=document.getElementById('tog');
tog.onclick = () => {
  hidden=!hidden;
  inner.style.display = hidden ? 'none' : 'flex';
  tog.textContent = hidden ? '☰' : '×';
};
</script>
</body>
</html>
