<script>
const stage = document.getElementById('stage');
let tx = 0, ty = 0, sc = 1;

function applyTransform() {
  stage.style.transform = `translate(${tx}px,${ty}px) scale(${sc})`;
}

// Init: center the map
function init() {
  const W = window.innerWidth, H = window.innerHeight;
  tx = (W - 1100 * sc) / 2;
  ty = (H - 740 * sc) / 2;
  applyTransform();
}
init();

// ── MOUSE ──
let mdrag = false, mlx, mly;
document.addEventListener('mousedown', e => { mdrag=true; mlx=e.clientX; mly=e.clientY; document.body.style.cursor='grabbing'; });
document.addEventListener('mouseup',   () => { mdrag=false; document.body.style.cursor='default'; });
document.addEventListener('mousemove', e => {
  if (!mdrag) return;
  tx += e.clientX - mlx; ty += e.clientY - mly;
  mlx = e.clientX; mly = e.clientY;
  applyTransform();
});
document.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const mx = e.clientX, my = e.clientY;
  tx = mx - (mx - tx) * delta;
  ty = my - (my - ty) * delta;
  sc = Math.min(4, Math.max(0.3, sc * delta));
  applyTransform();
}, { passive: false });

// ── TOUCH ──
let touches = [];
function dist(a, b) { return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY); }
function mid(a, b)  { return { x: (a.clientX+b.clientX)/2, y: (a.clientY+b.clientY)/2 }; }

document.addEventListener('touchstart', e => {
  e.preventDefault();
  touches = Array.from(e.touches);
}, { passive: false });

document.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = Array.from(e.touches);
  if (t.length === 1 && touches.length === 1) {
    tx += t[0].clientX - touches[0].clientX;
    ty += t[0].clientY - touches[0].clientY;
  } else if (t.length === 2 && touches.length >= 2) {
    const d0 = dist(touches[0], touches[1]);
    const d1 = dist(t[0], t[1]);
    const delta = d1 / d0;
    const m = mid(t[0], t[1]);
    tx = m.x - (m.x - tx) * delta;
    ty = m.y - (m.y - ty) * delta;
    sc = Math.min(4, Math.max(0.3, sc * delta));
  }
  touches = t;
  applyTransform();
}, { passive: false });

document.addEventListener('touchend', e => {
  touches = Array.from(e.touches);
}, { passive: false });

// ── BUTTONS ──
document.getElementById('bp').onclick = () => { sc=Math.min(4,sc*1.2); applyTransform(); };
document.getElementById('bm').onclick = () => { sc=Math.max(0.3,sc/1.2); applyTransform(); };
document.getElementById('br').onclick = () => { sc=1; init(); };
</script>
